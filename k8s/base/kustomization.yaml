apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# The shared, environment-agnostic manifests. Overlays reference this base
# and layer on their per-environment differences.
resources:
  - configmap.yaml
  - sealed-secret.yaml
  - discovery.yaml
  - mysql.yaml
  - authentication.yaml
  - customer.yaml
  - account.yaml
  - notification.yaml
  - gateway.yaml
  - mailpit.yaml
  - ingress.yaml
  - grafana-dashboard.yaml
  - alerts.yaml
  - jaeger.yaml
