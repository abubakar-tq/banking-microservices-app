apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentication-service
  labels:
    app: authentication-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: authentication-service
  template:
    metadata:
      labels:
        app: authentication-service
    spec:
      containers:
        - name: authentication-service
          image: authentication-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8885
          envFrom:
            - configMapRef:
                name: bank-config
            - secretRef:
                name: bank-secret
          env:
            - name: MYSQL_DATABASE
              value: auth_db
          readinessProbe:
            httpGet:
              path: /bank/actuator/health
              port: 8885
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 30
---
apiVersion: v1
kind: Service
metadata:
  name: authentication-service
spec:
  selector:
    app: authentication-service
  ports:
    - port: 8885
      targetPort: 8885
