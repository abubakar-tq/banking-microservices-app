services:
  mysql:
    image: mysql:8.4
    container_name: mysql
    environment:
      - MYSQL_ROOT_PASSWORD
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - bank-net

  discovery-service:
    image: discovery-service:local
    build:
      context: .
      dockerfile: discovery-service/Dockerfile
    container_name: discovery-service
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - bank-net
  gateway-service:
    image: gateway-service:local
    build:
      context: .
      dockerfile: gateway-service/Dockerfile
    container_name: gateway-service
    ports:
      - "8888:8888"
    environment:
      - DISCOVERY_SERVICE
      - JWT_SECRET
    depends_on:
      discovery-service:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - bank-net

  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit
    ports:
      - "8025:8025"
    networks:
      - bank-net

  authentication-service:
    image: authentication-service:local
    build:
      context: .
      dockerfile: authentication-service/Dockerfile
    container_name: authentication-service
    ports:
      - "8885:8885"
    environment:
      - DISCOVERY_SERVICE
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER
      - MYSQL_PWD
      - MYSQL_DATABASE=auth_db
      - JWT_SECRET
    depends_on:
      discovery-service:
        condition: service_healthy
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - bank-net

  customer-service:
    image: customer-service:local
    build:
      context: .
      dockerfile: customer-service/Dockerfile
    container_name: customer-service
    ports:
      - "8886:8886"
    environment:
      - DISCOVERY_SERVICE
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER
      - MYSQL_PWD
      - MYSQL_DATABASE=customer_db
      - JWT_SECRET
    depends_on:
      discovery-service:
        condition: service_healthy
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - bank-net

  account-service:
    image: account-service:local
    build:
      context: .
      dockerfile: account-service/Dockerfile
    container_name: account-service
    ports:
      - "8884:8884"
    environment:
      - DISCOVERY_SERVICE
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER
      - MYSQL_PWD
      - MYSQL_DATABASE=account_db
      - JWT_SECRET
    depends_on:
      discovery-service:
        condition: service_healthy
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - bank-net

  notification-service:
    image: notification-service:local
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: notification-service
    ports:
      - "8887:8887"
    environment:
      - DISCOVERY_SERVICE
      - MAIL_HOST=mailpit
      - MAIL_PORT=1025
      - MAIL_USERNAME
      - MAIL_PASSWORD
      - EMAIL_SYSTEM
    depends_on:
      discovery-service:
        condition: service_healthy
      mailpit:
        condition: service_started
    restart: unless-stopped
    networks:
      - bank-net

networks:
  bank-net:
    driver: bridge
volumes:
  mysql-data:
