name: CI

# Build every service image and push it to GHCR on each push to master.
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read      # to check out the code
  packages: write     # to push images to GHCR

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false          # one service failing shouldn't cancel the others
      matrix:
        service:
          - discovery-service
          - gateway-service
          - authentication-service
          - customer-service
          - account-service
          - notification-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # built-in token — no secret to configure

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .                              # repo root (multi-module build needs the parent pom)
          file: ${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:latest
          cache-from: type=gha                    # reuse Docker layer cache across runs
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true      # only flag vulns that have a fix available
          exit-code: '0'            # report-only for now; set to '1' to FAIL the build on findings
