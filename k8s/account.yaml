apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-service
  labels:
    app: account-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: account-service
  template:
    metadata:
      labels:
        app: account-service
    spec:
      containers:
        - name: account-service
          image: account-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8884
          envFrom:
            - configMapRef:
                name: bank-config
            - secretRef:
                name: bank-secret
          env:
            - name: MYSQL_DATABASE
              value: account_db
            - name: MANAGEMENT_METRICS_TAGS_APPLICATION   # adds application="account-service" to every metric
              value: account-service
          readinessProbe:
            httpGet:
              path: /bank/actuator/health
              port: 8884
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 30
---
apiVersion: v1
kind: Service
metadata:
  name: account-service
  labels:
    app: account-service          # so the ServiceMonitor can select this Service
spec:
  selector:
    app: account-service
  ports:
    - name: http                  # ServiceMonitor references the port BY NAME
      port: 8884
      targetPort: 8884
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: account-service
  labels:
    release: monitoring           # required: the stack's Prometheus only selects this label
spec:
  selector:
    matchLabels:
      app: account-service        # scrape Services with this label...
  endpoints:
    - port: http                  # ...on their "http" port...
      path: /bank/actuator/prometheus   # ...at this path (note the /bank context-path)
      interval: 15s               # every 15 seconds
