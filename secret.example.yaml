# Template for k8s/secret.yaml (this .example IS committed as documentation; the real
# secret.yaml is gitignored and never committed).
#
# For local/dev: copy to secret.yaml, fill real values, and `kubectl apply -f k8s/secret.yaml`.
# For real environments: do NOT store real values in Git at all — use Sealed Secrets or the
# External Secrets Operator (with Vault/cloud secret manager) so Git holds only an encrypted
# blob or a reference, never plaintext.
apiVersion: v1
kind: Secret
metadata:
  name: bank-secret
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: change-me
  MYSQL_USER: root
  MYSQL_PWD: change-me
  JWT_SECRET: change-me-to-a-long-random-secret
  MAIL_USERNAME: change-me
  MAIL_PASSWORD: change-me
